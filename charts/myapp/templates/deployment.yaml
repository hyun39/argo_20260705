# 08_Helm_Argo_진화관점.md Wave 2 예시를 그대로 재현 — 변수 자리 표시(Go template)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: myapp
spec:
  replicas: {{ .Values.replicaCount }}    # values에서 주입
  selector:
    matchLabels:
      app: myapp
  template:
    metadata:
      labels:
        app: myapp
    spec:
      containers:
      - name: app
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8000
        resources:
          {{- toYaml .Values.resources | nindent 10 }}
        readinessProbe: {httpGet: {path: /healthz, port: 8000}, initialDelaySeconds: 1, periodSeconds: 2}
