# 08_Helm_Argo_진화관점.md Wave 4 예시를 backend/frontend 2앱 x dev/prd 2환경 = Application 4개로 재현.
# repoURL/path/valueFiles는 실제 GitOps 저장소(argo_20260705, Wave 3이 만든 charts+envs 구조)를 가리킨다.
# syncPolicy.automated.{prune,selfHeal} 둘 다 켜서, push만으로(그리고 드리프트가 생겨도) 자동 반영됨을 실측한다.
#
# sync-wave 주석(backend=0, frontend=1)은 여기 붙여만 놔서는 효과가 없다 — 이 4개를 각자
# kubectl apply로 독립 등록하면 각자 알아서 auto-sync하기 때문에, ArgoCD가 이들 사이의 순서를
# 신경 쓰지 않는다(sync-wave는 "같은 부모 Application이 한 번에 sync하는 대상들" 사이에서만 유효).
# 실제로 순서를 강제하려면 root-application.yaml처럼 이 4개를 "자식"으로 관리하는 App of Apps가
# 필요하다 — 검증은 root-application.yaml 및 README.md의 "실행 순서 강제" 절 참고.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: backend-dev
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default
  source:
    repoURL: https://github.com/hyun39/argo_20260705.git
    targetRevision: main
    path: charts/backend
    helm:
      valueFiles:
      - ../../envs/dev/backend.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: wave4ord-dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: frontend-dev
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: default
  source:
    repoURL: https://github.com/hyun39/argo_20260705.git
    targetRevision: main
    path: charts/frontend
    helm:
      valueFiles:
      - ../../envs/dev/frontend.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: wave4ord-dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
---
