# 2단계: matrix 생성기 목록을 app=[backend,frontend] x env=[dev,prd]로 확장한 상태.
# 파일 하나(같은 wave6/argo-apps/applicationset.yaml)를 이 내용으로 덮어쓰고 push만 하면
# Application 4개(backend-dev, frontend-dev, backend-prd, frontend-prd)가 자동으로 생겨난다 —
# 서비스 10개 x 환경 5개 = Application 50개도 이 목록만 늘리면 되는 것과 동일한 원리.
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: wave6-matrix
  namespace: argocd
spec:
  generators:
  - matrix:
      generators:
      - list:
          elements:
          - app: backend
          - app: frontend
      - list:
          elements:
          - env: dev
          - env: prd
  template:
    metadata:
      name: '{{app}}-{{env}}'
      namespace: argocd
    spec:
      project: default
      source:
        repoURL: https://github.com/hyun39/argo_20260705.git
        targetRevision: main
        path: 'charts/{{app}}'
        helm:
          valueFiles:
          - '../../envs/{{env}}/{{app}}.yaml'
      destination:
        server: https://kubernetes.default.svc
        namespace: 'wave6-{{env}}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
        - CreateNamespace=true
